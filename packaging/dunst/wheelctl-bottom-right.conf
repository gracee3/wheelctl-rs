# Merge these settings into ~/.config/dunst/dunstrc to place wheelctl's
# libnotify OSD in the bottom-right corner. dunst controls notification
# placement globally; wheelctl cannot set screen position through notify-send.

[global]
origin = bottom-right
offset = (12, 48)
icon_position = off

[wheelctl]
appname = wheelctl
urgency = low
timeout = 1
format = "<b>%s</b>"
